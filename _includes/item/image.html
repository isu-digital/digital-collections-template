{% comment %}



{%- endcomment -%}

<a data-bs-toggle="modal" data-bs-target="#{{ page.objectid | slugify }}Modal" title="{{ page.title | escape }}" href="#">
    {% if page.disclaimer and page.image_thumb == nil and page.image_small == nil %}<div class="text-danger small">Warning: This image includes sensitive material and may be upsetting to some viewers. Click here to view the large image.</div>{% else %}
    <img src="{{ page.image_small | relative_url }}" alt="{{ page.image_alt_text | default: page.description | default: page.title | escape }}" class="img-fluid">{% endif %}
    <div><small class="text-dark">Select to view full item</small></div>
</a>
